services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ovgs
      POSTGRES_PASSWORD: ovgs
      POSTGRES_DB: ovgs
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://ovgs:ovgs@postgres:5432/ovgs
      PORT: 3000
      NODE_ENV: development
    depends_on:
      - postgres

volumes:
  postgres_data:
